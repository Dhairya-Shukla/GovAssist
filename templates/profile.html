<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GovAssist</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow p-4">

                <div class="profile-icon">
                    👤
                </div>

                <h2 class="text-center mb-2">
                    User Profile
                </h2>

                <p class="text-center text-muted mb-4">
                    Enter your details to discover schemes you qualify for
                </p>

                <form action="/profile" method="POST">

                    <!-- Name -->
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text"
                               class="form-control"
                               name="name"
                               minlength="3"
                               maxlength="100"
                                placeholder="Enter your full name"
                               required>
                    </div>

                    <!-- Age -->
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number"
                            class="form-control"
                            name="age"
                            min="18"
                            max="120"
                            placeholder="Enter your age"
                            required>
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label class="form-label">Gender</label>

                        <select class="form-select" name="gender">
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <!-- Occupation -->
                    <div class="mb-3">
                        <label class="form-label">Occupation</label>

                        <select class="form-select" name="occupation">
                            <option>Student</option>
                            <option>Farmer</option>
                            <option>Government Employee</option>
                            <option>Private Employee</option>
                            <option>Business Owner</option>
                            <option>Self Employed</option>
                            <option>Labourer</option>
                            <option>Unemployed</option>
                            <option>Retired</option>
                        </select>
                    </div>

                    <!-- Income -->
                    <div class="mb-3">
                        <label class="form-label">
                            Annual Income (₹)
                        </label>

                        <input type="number"
                            class="form-control"
                            name="income"
                            min="0"
                            placeholder="Enter your annual income"
                            required>
                    </div>

                    <!-- State -->
                    <div class="mb-3">

                        <label class="form-label">
                            State / Union Territory
                        </label>

                        <select class="form-select"
                                name="state"
                                required>

                            <option value="">Select State / UT</option>

                            <option>Andhra Pradesh</option>
                            <option>Arunachal Pradesh</option>
                            <option>Assam</option>
                            <option>Bihar</option>
                            <option>Chhattisgarh</option>
                            <option>Goa</option>
                            <option>Gujarat</option>
                            <option>Haryana</option>
                            <option>Himachal Pradesh</option>
                            <option>Jharkhand</option>
                            <option>Karnataka</option>
                            <option>Kerala</option>
                            <option>Madhya Pradesh</option>
                            <option>Maharashtra</option>
                            <option>Manipur</option>
                            <option>Meghalaya</option>
                            <option>Mizoram</option>
                            <option>Nagaland</option>
                            <option>Odisha</option>
                            <option>Punjab</option>
                            <option>Rajasthan</option>
                            <option>Sikkim</option>
                            <option>Tamil Nadu</option>
                            <option>Telangana</option>
                            <option>Tripura</option>
                            <option>Uttar Pradesh</option>
                            <option>Uttarakhand</option>
                            <option>West Bengal</option>

                            <option>Andaman and Nicobar Islands</option>
                            <option>Chandigarh</option>
                            <option>Dadra and Nagar Haveli and Daman and Diu</option>
                            <option>Delhi</option>
                            <option>Jammu and Kashmir</option>
                            <option>Ladakh</option>
                            <option>Lakshadweep</option>
                            <option>Puducherry</option>

                        </select>

                    </div>

                    <!-- Category -->
                    <div class="mb-4">

                        <label class="form-label">
                            Category
                        </label>

                        <select class="form-select"
                                name="category">

                            <option>General</option>
                            <option>OBC</option>
                            <option>SC</option>
                            <option>ST</option>
                            <option>EWS</option>
                            <option>Other</option>

                        </select>

                    </div>

                    <div class="text-center">

                        <button class="btn btn-primary btn-lg">
                            Find My Schemes
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>
new TomSelect("select[name='state']");
new TomSelect("select[name='occupation']");
new TomSelect("select[name='category']");
</script>

</body>
</html>
